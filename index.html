<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oli Donoghue</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Cormorant+Garamond:ital,wght@1,300&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0c0c0a;--cream:#f0ebe0;--muted:rgba(240,235,224,0.25);--dim:rgba(240,235,224,0.55);--gold:#c8a96e}
html,body{width:100%;height:100%;background:var(--bg);color:var(--cream);-webkit-font-smoothing:antialiased;overflow:hidden}
.bg{position:fixed;inset:0;overflow:hidden;pointer-events:none}
.orb{position:absolute;border-radius:50%}
.orb-1{top:-10%;right:-5%;width:55%;height:70%;background:radial-gradient(circle,rgba(38,32,18,0.95) 0%,rgba(28,24,14,0.6) 50%,transparent 75%);animation:drift1 18s ease-in-out infinite}
.orb-2{bottom:-15%;left:-10%;width:60%;height:65%;background:radial-gradient(circle,rgba(22,26,20,0.9) 0%,rgba(18,22,16,0.5) 50%,transparent 75%);animation:drift2 22s ease-in-out infinite}
.orb-3{top:30%;left:30%;width:45%;height:50%;background:radial-gradient(circle,rgba(200,169,110,0.07) 0%,rgba(180,148,90,0.03) 50%,transparent 75%);animation:drift3 15s ease-in-out infinite}
.orb-4{top:10%;left:20%;width:30%;height:40%;background:radial-gradient(circle,rgba(32,36,28,0.7) 0%,transparent 70%);animation:drift2 25s ease-in-out infinite reverse}
.page{position:relative;z-index:2;width:100%;height:100vh;padding:clamp(32px,5vw,60px);display:flex;flex-direction:column;justify-content:space-between}
.top{display:flex;justify-content:space-between;animation:fu 0.7s ease 0.1s both}
.top span{font-family:'DM Mono',monospace;font-size:10px;font-weight:300;letter-spacing:0.4em;text-transform:uppercase;color:var(--muted)}
.centre{flex:1;display:flex;flex-direction:column;justify-content:center;padding:24px 0;animation:fu 0.9s ease 0.3s both}
.name{line-height:0.88;margin-bottom:clamp(24px,3vw,36px)}
.name span{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:clamp(72px,12vw,152px);letter-spacing:-0.025em;color:var(--cream);display:block}
.rule{width:36px;height:1px;background:rgba(240,235,224,0.12);margin-bottom:clamp(18px,2.5vw,28px)}
.roles{font-family:'DM Mono',monospace;font-size:clamp(10px,1vw,13px);font-weight:300;letter-spacing:0.22em;text-transform:uppercase;color:var(--dim);animation:fu 0.7s ease 0.6s both}
.bottom{display:flex;justify-content:space-between;align-items:flex-end;animation:fu 0.7s ease 0.85s both}
.contact{display:flex;flex-direction:column;gap:6px}
.contact-label{font-family:'DM Mono',monospace;font-size:9px;font-weight:300;letter-spacing:0.4em;text-transform:uppercase;color:var(--muted)}
.contact-email{font-family:'DM Mono',monospace;font-size:clamp(10px,1vw,13px);font-weight:300;letter-spacing:0.12em;color:rgba(240,235,224,0.78);text-decoration:none;transition:color 0.2s}
.contact-email:hover{color:var(--gold)}
.game-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:7px}
.game-label{font-family:'DM Mono',monospace;font-size:9px;font-weight:300;letter-spacing:0.35em;text-transform:uppercase;color:rgba(200,169,110,0.65)}
.game-btn{font-family:'DM Mono',monospace;font-size:clamp(12px,1.2vw,15px);font-weight:400;letter-spacing:0.28em;text-transform:uppercase;color:var(--bg);background:var(--gold);border:none;padding:clamp(15px,1.8vw,20px) clamp(28px,3vw,40px);cursor:pointer;text-decoration:none;display:inline-block;transition:background 0.2s,transform 0.15s}
.game-btn:hover{background:#d4b87a;transform:translateY(-1px)}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes drift1{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(40px,-30px) scale(1.1)}66%{transform:translate(-20px,20px) scale(0.95)}}
@keyframes drift2{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(-35px,25px) scale(1.08)}66%{transform:translate(30px,-15px) scale(0.97)}}
@keyframes drift3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(20px,30px) scale(1.05)}}
@media(max-width:600px){html,body{overflow-y:auto}.page{height:auto;min-height:100vh}.bottom{flex-direction:column;align-items:flex-start;gap:32px}}
</style>
</head>
<body>
<div class="bg">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>
</div>
<div class="page">
  <div class="top">
    <span>donoghue.co</span>
    <span style="letter-spacing:0.2em">Est. Dublin</span>
  </div>
  <div class="centre">
    <div class="name">
      <span>Oli</span>
      <span>Donoghue</span>
    </div>
    <div class="rule"></div>
    <div class="roles">Entrepreneur · NED · Investor</div>
  </div>
  <div class="bottom">
    <div class="contact">
      <span class="contact-label">Contact</span>
      <a class="contact-email" href="mailto:oli@donoghue.co">oli@donoghue.co</a>
    </div>
    <div class="game-wrap">
      <span class="game-label">Play the game</span>
      <a class="game-btn" href="https://olidonog.github.io/donoghue.co" target="_blank">Mode: Oli →</a>
    </div>
  </div>
</div>
</body>
</html>
