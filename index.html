<!DOCTYPE html>
<html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Oli Donoghue</title>
    <style>
          @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@200;300;400&display=swap');
          *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
          html, body { width: 100%; height: 100%; overflow: hidden; }
          body { background: #0a0a0a; display: flex; align-items: center; justify-content: center; font-family: 'Montserrat', sans-serif; }
          .bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
          .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.35; }
          .orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, #c8a96e 0%, transparent 70%); top: -15%; left: -10%; animation: drift1 22s linear infinite; }
          .orb-2 { width: 500px; height: 500px; background: radial-gradient(circle, #8b7355 0%, transparent 70%); bottom: -10%; right: -5%; animation: drift2 18s linear infinite; }
          .orb-3 { width: 400px; height: 400px; background: radial-gradient(circle, #6b5a3e 0%, transparent 70%); top: 40%; left: 55%; animation: drift3 25s linear infinite; }
          @keyframes drift1 { 0% { transform: translate(0,0) scale(1); } 33% { transform: translate(120px,80px) scale(1.1); } 66% { transform: translate(60px,180px) scale(0.95); } 100% { transform: translate(0,0) scale(1); } }
          @keyframes drift2 { 0% { transform: translate(0,0) scale(1); } 33% { transform: translate(-100px,-60px) scale(1.05); } 66% { transform: translate(-50px,-140px) scale(1.1); } 100% { transform: translate(0,0) scale(1); } }
          @keyframes drift3 { 0% { transform: translate(0,0) scale(1); } 50% { transform: translate(-80px,60px) scale(1.15); } 100% { transform: translate(0,0) scale(1); } }
          .content { position: relative; z-index: 2; text-align: center; padding: 2rem; }
          .name { font-family: 'Cormorant Garamond', serif; font-size: clamp(3.5rem, 9vw, 7rem); font-weight: 300; color: #f5f0e8; letter-spacing: 0.02em; line-height: 1; margin-bottom: 1.2rem; }
          .tagline { font-family: 'Montserrat', sans-serif; font-size: clamp(0.6rem, 1.3vw, 0.75rem); font-weight: 300; color: #8a8070; letter-spacing: 0.35em; text-transform: uppercase; margin-bottom: 3rem; }
          .cta { display: inline-block; padding: 0.85rem 2.4rem; border: 1px solid rgba(200,169,110,0.5); color: #c8a96e; font-family: 'Montserrat', sans-serif; font-size: 0.65rem; font-weight: 300; letter-spacing: 0.3em; text-transform: uppercase; text-decoration: none; transition: all 0.4s ease; position: relative; overflow: hidden; }
          .cta::before { content: ''; position: absolute; inset: 0; background: rgba(200,169,110,0.08); transform: translateX(-100%); transition: transform 0.4s ease; }
          .cta:hover::before { transform: translateX(0); }
          .cta:hover { border-color: rgba(200,169,110,0.9); color: #e8d5a8; letter-spacing: 0.35em; }
          .footer-line { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); z-index: 2; font-family: 'Montserrat', sans-serif; font-size: 0.55rem; font-weight: 300; color: #3a3530; letter-spacing: 0.3em; text-transform: uppercase; }
        </style>
  </head>
  <body>
      <div class="bg">
            <div class="orb orb-1"></div>div>
            <div class="orb orb-2"></div>div>
            <div class="orb orb-3"></div>div>
      </div>div>
      <div class="content">
            <h1 class="name">Oli Donoghue</h1>h1>
            <p class="tagline">Entrepreneur · NED · Investor</p>p>
            <a href="https://olidonog.github.io/donoghue.co/" class="cta">Mode: Oli</a>a>
      </div>div>
      <div class="footer-line">donoghue.co</div>div>
  </body>
