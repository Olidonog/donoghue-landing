<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oli Donoghue</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Cormorant+Garamond:ital,wght@1,300&display=swap');
    :root{--bg:#0c0c0a;--cream:#f0ebe0;--muted:rgba(240,235,224,0.55);--gold:#c8a96e}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:var(--bg);color:var(--cream);-webkit-font-smoothing:antialiased;overflow:hidden}
    .bg{position:fixed;inset:0;overflow:hidden;pointer-events:none;isolation:isolate}
    .orb{position:absolute;border-radius:50%;will-change:transform}
    .orb-1{top:-10%;right:-5%;width:60%;height:70%;background:radial-gradient(circle,rgba(200,150,40,0.7) 0%,rgba(160,110,20,0.4) 35%,transparent 70%);animation:drift1 18s ease-in-out infinite}
    .orb-2{bottom:-15%;left:-10%;width:65%;height:65%;background:radial-gradient(circle,rgba(60,130,60,0.6) 0%,rgba(30,90,40,0.35) 35%,transparent 70%);animation:drift2 22s ease-in-out infinite}
    .orb-3{top:20%;left:20%;width:55%;height:60%;background:radial-gradient(circle,rgba(200,169,110,0.35) 0%,rgba(160,130,80,0.15) 40%,transparent 70%);animation:drift3 15s ease-in-out infinite}
    @keyframes drift1{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(-60px,50px) scale(1.08)}50%{transform:translate(-30px,90px) scale(0.95)}75%{transform:translate(-80px,40px) scale(1.05)}}
    @keyframes drift2{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(50px,-40px) scale(1.06)}50%{transform:translate(80px,-70px) scale(1.1)}75%{transform:translate(30px,-30px) scale(0.97)}}
    @keyframes drift3{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(40px,30px) scale(1.12)}66%{transform:translate(-30px,50px) scale(0.93)}}
    .page{position:relative;z-index:2;width:100%;height:100vh;padding:clamp(32px,5vw,60px);display:flex;flex-direction:column;justify-content:space-between}
    .top{display:flex;justify-content:space-between;animation:fu 0.7s ease 0.1s both}
    .top span{font-family:'DM Mono',monospace;font-size:10px;font-weight:300;letter-spacing:0.4em;text-transform:uppercase;color:var(--muted)}
    .centre{flex:1;display:flex;flex-direction:column;justify-content:center;padding:24px 0;animation:fu 0.9s ease 0.3s both}
    .name{line-height:0.88;margin-bottom:clamp(24px,3vw,36px)}
    .name span{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:clamp(72px,12vw,152px);letter-spacing:-0.025em;color:var(--cream)}
    .rule{width:36px;height:1px;background:rgba(240,235,224,0.2);margin-bottom:clamp(18px,2.5vw,28px)}
    .roles{font-family:'DM Mono',monospace;font-size:clamp(10px,1vw,13px);font-weight:300;letter-spacing:0.22em;text-transform:uppercase;color:var(--muted)}
    .bottom{display:flex;justify-content:space-between;align-items:flex-end;animation:fu 0.7s ease 0.85s both}
    .contact-label{font-family:'DM Mono',monospace;font-size:10px;font-weight:300;letter-spacing:0.4em;text-transform:uppercase;color:var(--muted)}
    .cta-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:14px}
    .cta{display:inline-flex;align-items:center;font-family:'DM Mono',monospace;font-size:11px;font-weight:300;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);text-decoration:none;border:1px solid rgba(200,169,110,0.45);padding:14px 28px;transition:all 0.4s ease;position:relative;overflow:hidden}
    .cta::before{content:'';position:absolute;inset:0;background:rgba(200,169,110,0.08);transform:translateX(-101%);transition:transform 0.4s ease}
    .cta:hover::before{transform:translateX(0)}
    .cta:hover{border-color:rgba(200,169,110,0.9);letter-spacing:0.35em}
    .year{font-family:'DM Mono',monospace;font-size:10px;font-weight:300;letter-spacing:0.3em;color:rgba(240,235,224,0.25)}
    @keyframes fu{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
  </style>
</head>
<body>
  <div class="bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>
  <div class="page">
    <div class="top">
      <span>Donoghue.co</span>
      <span>Available</span>
    </div>
    <div class="centre">
      <div class="name"><span>Oli Donoghue</span></div>
      <div class="rule"></div>
      <div class="roles">Entrepreneur &nbsp;&middot;&nbsp; NED &nbsp;&middot;&nbsp; Investor</div>
    </div>
    <div class="bottom">
      <span class="contact-label">oli@donoghue.co</span>
      <div class="cta-wrap">
        <a href="https://olidonog.github.io/donoghue.co/" class="cta">Mode: Oli</a>
        <span class="year">2025</span>
      </div>
    </div>
  </div>
</body>
</html>
